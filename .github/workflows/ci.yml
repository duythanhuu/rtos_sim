name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  posix:
    name: POSIX / Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install 32-bit build dependencies
        run: sudo apt-get install -y gcc-multilib

      - name: Configure
        run: cmake -S . -B build -DRTOS_SIM_DEMO=BLINKY

      - name: Build
        run: cmake --build build

      - name: Run tick timing test
        run: |
          timeout 15 stdbuf -oL ./build/bin/rtos_sim > output.txt 2>&1 || true
          cat output.txt
          grep -q "Tick Timing Test: PASSED" output.txt

  windows:
    name: Windows / MinGW
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      # Use msys2/setup-msys2 with MINGW32 to get a native 32-bit (i686)
      # MinGW-w64 toolchain.  This is the recommended way to use MSYS2 on
      # GitHub Actions and avoids PATH / sh.exe conflicts with MinGW Makefiles.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: false
          install: >-
            mingw-w64-i686-gcc
            mingw-w64-i686-cmake
            mingw-w64-i686-ninja

      - name: Configure
        run: cmake -S . -B build -G Ninja -DRTOS_SIM_DEMO=BLINKY

      - name: Build
        run: cmake --build build

      - name: Run tick timing test
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath ".\build\bin\rtos_sim.exe" `
                                -RedirectStandardOutput "output.txt" `
                                -NoNewWindow -PassThru
          $proc | Wait-Process -Timeout 15 -ErrorAction SilentlyContinue
          if (-not $proc.HasExited) { $proc | Stop-Process -Force }
          Get-Content "output.txt"
          if (-not (Select-String -Path "output.txt" -Pattern "Tick Timing Test: PASSED" -Quiet)) {
            Write-Error "Tick timing test did not PASS"
            exit 1
          }

  windows-msvc:
    name: Windows / MSVC x86
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Initialise the x86 MSVC environment (vcvarsall x86) so that cmake
      # picks up cl.exe and the 32-bit linker when using the Ninja generator.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure
        run: cmake -S . -B build -G Ninja -DRTOS_SIM_DEMO=BLINKY

      - name: Build
        run: cmake --build build

      - name: Run tick timing test
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath ".\build\bin\rtos_sim.exe" `
                                -RedirectStandardOutput "output.txt" `
                                -NoNewWindow -PassThru
          $proc | Wait-Process -Timeout 15 -ErrorAction SilentlyContinue
          if (-not $proc.HasExited) { $proc | Stop-Process -Force }
          Get-Content "output.txt"
          if (-not (Select-String -Path "output.txt" -Pattern "Tick Timing Test: PASSED" -Quiet)) {
            Write-Error "Tick timing test did not PASS"
            exit 1
          }
